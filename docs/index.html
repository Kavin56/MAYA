<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MAYA Tunnel Redirect</title>
    <meta http-equiv="cache-control" content="no-cache" />
    <meta http-equiv="pragma" content="no-cache" />
    <meta http-equiv="expires" content="0" />
    <style>
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        margin: 40px;
        line-height: 1.4;
      }
      code {
        background: #f3f4f6;
        padding: 2px 6px;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <h2>MAYA tunnel redirect</h2>
    <p>Fetching current tunnel URL…</p>
    <p id="status"></p>

    <script>
      (async () => {
        const statusEl = document.getElementById("status");
        try {
          const res = await fetch("./tunnel.json", { cache: "no-store" });
          if (!res.ok) throw new Error(`Failed to load tunnel.json (${res.status})`);
          const json = await res.json();
          const url = typeof json?.url === "string" ? json.url.trim() : "";
          if (!/^https:\/\/[a-z0-9-]+\.trycloudflare\.com\/?$/.test(url)) {
            throw new Error(
              "tunnel.json has an invalid url. Expected https://<random>.trycloudflare.com"
            );
          }
          const dest = url.replace(/\/$/, "");
          statusEl.textContent = `Redirecting to ${dest} …`;
          window.location.replace(dest);
        } catch (err) {
          statusEl.textContent =
            err instanceof Error ? err.message : "Failed to determine current tunnel URL.";
        }
      })();
    </script>
  </body>
</html>
